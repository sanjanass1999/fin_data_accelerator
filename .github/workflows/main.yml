name: FinDataAccelerator CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (flake8 — syntax + undefined names)
        run: |
          pip install flake8
          flake8 app/ scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Seed knowledge base
        run: python scripts/seed_data.py --reset

      - name: Run tests
        run: pytest -q

  build:
    name: Build Docker image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t findata-accelerator:${{ github.sha }} .

      - name: Verify image
        run: docker image inspect findata-accelerator:${{ github.sha }} > /dev/null && echo "Image OK"
